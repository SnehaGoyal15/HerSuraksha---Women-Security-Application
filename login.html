<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HerSuraksha</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <link rel="stylesheet" href="css/pages/login.css">
</head>
<body>
    <img src="assets/images/logo.png" class="fixed-logo" alt="Logo">
    
    <div class="login-box">
        <h2>Sign Up</h2>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="mobile" placeholder="Mobile Number" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="blood" placeholder="Blood Group" required>
        <button id="loginBtn">Login</button>
        <div id="message"></div>
    </div>

    <script type="module" src="js/utils/global-fake-call-watcher.js"></script>
    <script type="module" src="js/pages/login.js"></script>
</body>
</html>
