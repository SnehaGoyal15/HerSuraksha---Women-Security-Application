<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css/pages/stealth.css">
</head>
<body>
    <main class="calculator-shell">
        <section class="calculator-app">
            <div class="calculator-topbar">
                <span>Calculator</span>
            </div>

            <button class="calculator-display" id="calculatorDisplay" type="button" aria-label="Calculator display">
                <span class="calculator-expression" id="calculatorExpression">0</span>
                <span class="calculator-result" id="calculatorResult">&nbsp;</span>
            </button>

            <div class="calculator-grid">
                <button class="calc-btn calc-btn-muted" data-action="clear" type="button">AC</button>
                <button class="calc-btn calc-btn-muted" data-action="backspace" type="button">⌫</button>
                <button class="calc-btn calc-btn-muted" data-value="%" type="button">%</button>
                <button class="calc-btn calc-btn-operator" data-value="/" type="button">÷</button>

                <button class="calc-btn" data-value="7" type="button">7</button>
                <button class="calc-btn" data-value="8" type="button">8</button>
                <button class="calc-btn" data-value="9" type="button">9</button>
                <button class="calc-btn calc-btn-operator" data-value="*" type="button">×</button>

                <button class="calc-btn" data-value="4" type="button">4</button>
                <button class="calc-btn" data-value="5" type="button">5</button>
                <button class="calc-btn" data-value="6" type="button">6</button>
                <button class="calc-btn calc-btn-operator" data-value="-" type="button">−</button>

                <button class="calc-btn" data-value="1" type="button">1</button>
                <button class="calc-btn" data-value="2" type="button">2</button>
                <button class="calc-btn" data-value="3" type="button">3</button>
                <button class="calc-btn calc-btn-operator" data-value="+" type="button">+</button>

                <button class="calc-btn calc-btn-wide" data-value="0" type="button">0</button>
                <button class="calc-btn" data-value="." type="button">.</button>
                <button class="calc-btn calc-btn-equals" data-action="equals" type="button">=</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/utils/global-fake-call-watcher.js"></script>
    <script type="module" src="js/pages/stealth.js"></script>
</body>
</html>
