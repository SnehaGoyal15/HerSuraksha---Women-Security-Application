<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact - HerSuraksha</title>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    
    <link rel="stylesheet" href="css/pages/edit-contact.css">
</head>
<body>

<!-- HEADER WITH LOGO -->
<div class="dashboard-header">
    <div class="header-content">
        <img src="assets/images/logo.png" class="header-logo" alt="Logo">
        <div class="header-title">Edit Contact</div>
        <div class="header-help" id="helpBtn">Help?</div>
    </div>
</div>

<!-- EDIT CONTACT FORM -->
<div class="edit-container">
    <div class="edit-card">
        <h2>✏️ Edit Emergency Contact</h2>
        
        <div class="form-group">
            <label for="editName">Full Name</label>
            <input type="text" id="editName" placeholder="Enter full name">
        </div>
        
        <div class="form-group">
            <label for="editPhone">Phone Number</label>
            <input type="tel" id="editPhone" placeholder="Enter phone number">
        </div>
        
        <div class="form-group">
            <label for="editRelation">Relation</label>
            <input type="text" id="editRelation" placeholder="e.g., Mother, Friend">
        </div>
        
        <div class="form-group">
            <label for="editEmail">Email Address</label>
            <input type="email" id="editEmail" placeholder="Enter email address">
        </div>
        
        <div class="form-actions">
            <button class="save-btn" id="saveEditBtn">💾 Save Changes</button>
            <button class="cancel-btn" id="cancelBtn">✖ Cancel</button>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="dashboard-footer">
    <div class="footer-content">
        <div class="icon-box" id="homeBtn">
            <img src="assets/images/home.png" class="footer-icon" alt="Home">
            <span>Home</span>
        </div>
        <div class="icon-box" id="contactsBtn">
            <img src="assets/images/contacts.png" class="footer-icon" alt="Contacts">
            <span>Contacts</span>
        </div>
        <div class="icon-box" id="addBtn">
            <img src="assets/images/add.png" class="footer-icon" alt="Add">
            <span>Add</span>
        </div>
        <div class="icon-box" id="locationBtn">
            <img src="assets/images/location.png" class="footer-icon" alt="Location">
            <span>Location</span>
        </div>
        <div class="icon-box" id="accountBtn">
            <img src="assets/images/acc.png" class="footer-icon" alt="Account">
            <span>Account</span>
        </div>
    </div>
</footer>

<script type="module" src="js/utils/global-fake-call-watcher.js"></script>
<script type="module" src="js/pages/edit-contact.js"></script>
</body>
</html>
